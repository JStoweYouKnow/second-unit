<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="icon" type="image/png" href="/favicon.png" sizes="32x32" />
    <link rel="icon" type="image/png" href="/favicon-16.png" sizes="16x16" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" sizes="180x180" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#fafaf8" />
    <meta name="description" content="The world's leading marketplace for professional AI artists and creators. Hire top talent for visual arts, motion design, and more." />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://thecallsheet.ai/" />
    <meta property="og:title" content="The Callsheet — Premium AI Artist Marketplace" />
    <meta property="og:description" content="Hire the world's top AI artists. Professional workflows, secure payments, and legally binding contracts." />
    <meta property="og:image" content="https://thecallsheet.ai/og-image.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://thecallsheet.ai/" />
    <meta property="twitter:title" content="The Callsheet — Premium AI Artist Marketplace" />
    <meta property="twitter:description" content="Hire the world's top AI artists. Professional workflows, secure payments, and legally binding contracts." />
    <meta property="twitter:image" content="https://thecallsheet.ai/og-image.png" />

    <title>The Callsheet — Premium AI Artist Marketplace</title>
  </head>
  <body>
    <script>
      (function () {
        try {
          var t = localStorage.getItem('cs_theme');
          if (t !== 'light' && t !== 'dark') {
            t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          document.documentElement.setAttribute('data-theme', t);
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.setAttribute('content', t === 'dark' ? '#0a0a0a' : '#fafaf8');
        } catch (e) {}
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
